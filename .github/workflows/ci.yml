name: Agent Core CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
      fail-fast: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov bandit pyfakefs hypothesis
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: ruff check agent_core/ tests/

      - name: Type check with MyPy
        run: mypy --strict agent_core/

      - name: Run tests & coverage
        run: pytest --cov=agent_core --cov-fail-under=80 --cov-report=term-missing --cov-report=html

      - name: Security scan with Bandit
        run: bandit -r agent_core/ -ll